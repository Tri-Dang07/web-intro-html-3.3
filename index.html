<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Thông Báo Học Tập</title>
  <style>
    /* Định dạng cho hộp thông báo lớn (Block-level) */
    .thong-bao {
      background-color: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
      padding: 15px 20px;
      margin: 20px auto;
      border-radius: 5px;
      max-width: 600px;
      font-family: Arial, sans-serif;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    /* Định dạng cho cụm từ nhấn mạnh trong dòng (Inline) */
    .quan-trong {
      color: #721c24;
      background-color: #f8d7da;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: bold;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <main>

    <div class="thong-bao">
      <h3>📢 THÔNG BÁO KHẨN: Nộp Bài Tập Lớn HTML</h3>
      <p>
        Yêu cầu tất cả các học viên hoàn thiện dự án cá nhân và tải mã nguồn lên hệ thống đúng hạn. Hệ thống sẽ tự động khóa và từ chối ghi nhận mọi trường hợp nộp muộn.
      </p>
      <p>
        ⏰ Hạn nộp bài: <span class="quan-trong">Trước 23:59 ngày 30 tháng 06 năm 2026</span>.
      </p>
    </div>

  </main>

  </body>
</html>
